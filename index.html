<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ollama Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <style>
    :root{
      --bg:#0b1220;
      --card:#111827;
      --soft:#1f2937;
      --border:#334155;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --primary:#2563eb;
      --user-msg:#1d4ed8;
      --bot-msg:#1e293b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
    }
    
    /* ── COMPACT APP LAYOUT ── */
    .app-container {
      width: 100%;
      max-width: 768px;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--card);
      position: relative;
      overflow: hidden;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    
    /* ── HEADER & TOGGLE ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hamburger {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .title {
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mode-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .mode-toggle-wrap span { font-size: 13px; font-weight: bold; transition: color 0.3s; }
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { display: none; }
    .slider {
      position: absolute; inset: 0; border-radius: 20px;
      background: #22c55e; cursor: pointer; transition: background .3s;
    }
    .slider::before {
      content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
      border-radius: 50%; background: white; transition: transform .3s;
    }
    .toggle input:checked + .slider { background: #6366f1; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    /* ── CHAT AREA ── */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg);
    }
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
    }
    .user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 4px; }
    .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    
    .mode-badge {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      align-self: flex-start;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-fast { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge-think { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }

    .think-block {
      background: #0f1a14; border: 1px solid #1f4d2e; color: #6ee7b7;
      border-radius: 8px; padding: 8px 10px; font-size: 12px;
      margin-bottom: 8px; white-space: pre-wrap; word-break: break-word;
    }
    .think-toggle {
      font-size: 12px; color: #4ade80; cursor: pointer; background: none;
      border: none; margin: 0 0 6px; padding: 0; text-align: left; display: block;
    }

    /* ── INPUT AREA ── */
    footer {
      padding: 12px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
    }
    .send-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .send-btn:active { opacity: 0.7; }

    /* ── SETTINGS DRAWER ── */
    .overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.active { opacity: 1; pointer-events: auto; }
    
    .drawer {
      position: absolute; top: 0; left: 0; bottom: 0; width: 280px;
      background: var(--card); z-index: 50; transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .drawer.active { transform: translateX(0); }
    .drawer-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px; border-bottom: 1px solid var(--border);
    }
    .drawer-header h2 { margin: 0; font-size: 18px; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
    
    .drawer-content { padding: 16px; overflow-y: auto; flex: 1; }
    .drawer-content label { display: block; margin: 12px 0 6px; font-size: 13px; color: var(--muted); }
    .drawer-content input {
      width: 100%; border-radius: 8px; border: 1px solid var(--border);
      padding: 10px; font-size: 14px; background: var(--soft); color: var(--text);
    }
    .drawer-content button {
      width: 100%; border-radius: 8px; border: none; padding: 10px;
      font-size: 14px; font-weight: 500; color: white; cursor: pointer; margin-top: 12px;
    }
    .btn-save { background: var(--primary); }
    .btn-test { background: #475569; }
    .btn-clear { background: transparent; border: 1px solid #7f1d1d !important; color: #fca5a5 !important; margin-top: 24px !important; }
    
    .status { margin-top: 12px; font-size: 12px; color: var(--muted); white-space: pre-wrap; line-height: 1.4; }
    .ok { color: #86efac; }
    .err { color: #fca5a5; }
    
    .system-msg { align-self: center; font-size: 12px; color: var(--muted); margin: 8px 0; }
  </style>
</head>
<body>

<div class="app-container">
  
  <div id="overlay" class="overlay"></div>
  <div id="drawer" class="drawer">
    <div class="drawer-header">
      <h2>⚙️ Settings</h2>
      <button id="closeDrawer" class="close-btn">✕</button>
    </div>
    <div class="drawer-content">
      <label for="ngrokUrl">Ngrok URL</label>
      <input id="ngrokUrl" type="text" placeholder="https://abcd.ngrok-free.app" />

      <label for="model">Model</label>
      <input id="model" type="text" placeholder="gemma4:e4b" />

      <button id="saveSettings" class="btn-save">💾 Save Settings</button>
      <button id="checkHealth" class="btn-test">🔌 Test Connection</button>
      
      <div id="status" class="status">Configure your gateway to start chatting.</div>

      <button id="clearBtn" class="btn-clear">🗑 Clear Chat History</button>
    </div>
  </div>

  <header>
    <div class="header-left">
      <button id="openDrawer" class="hamburger">☰</button>
      <div class="title">🤖 Ollama</div>
    </div>
    <div class="mode-toggle-wrap">
      <span id="lblFast" style="color:#34d399;">⚡ Fast</span>
      <label class="toggle">
        <input type="checkbox" id="modeToggle" />
        <span class="slider"></span>
      </label>
      <span id="lblThink" style="color:#475569;">🧠 Think</span>
    </div>
  </header>

  <main id="chatBox" class="chat-box"></main>

  <footer>
    <textarea id="message" rows="1" placeholder="Type a message..."></textarea>
    <button id="sendBtn" class="send-btn">➤</button>
  </footer>

</div>

<script>
  const ngrokUrlEl  = document.getElementById("ngrokUrl");
  const modelEl     = document.getElementById("model");
  const modeToggle  = document.getElementById("modeToggle");
  const lblFast     = document.getElementById("lblFast");
  const lblThink    = document.getElementById("lblThink");
  const statusEl    = document.getElementById("status");
  const chatBox     = document.getElementById("chatBox");
  const messageEl   = document.getElementById("message");
  const drawer      = document.getElementById("drawer");
  const overlay     = document.getElementById("overlay");

  const NGROK_HEADERS = {
    "Content-Type": "application/json",
    "ngrok-skip-browser-warning": "1"
  };

  document.getElementById("openDrawer").addEventListener("click", () => {
    drawer.classList.add("active"); overlay.classList.add("active");
  });
  const closeDrawer = () => {
    drawer.classList.remove("active"); overlay.classList.remove("active");
  };
  document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
  overlay.addEventListener("click", closeDrawer);

  messageEl.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = (this.scrollHeight < 120 ? this.scrollHeight : 120) + "px";
  });

  function normalizeUrl(u){ return (u||"").trim().replace(/\/+$/,""); }
  function setStatus(t, type=""){
    statusEl.className = "status" + (type ? " " + type : "");
    statusEl.textContent = t;
  }
  function appendSystemMsg(text) {
    const div = document.createElement("div");
    div.className = "system-msg";
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function isThinking(){ return modeToggle.checked; }
  function updateModeUI(){
    const thinking = isThinking();
    lblFast.style.color  = thinking ? "#475569" : "#34d399";
    lblThink.style.color = thinking ? "#818cf8" : "#475569";
  }
  modeToggle.addEventListener("change", ()=>{
    updateModeUI();
    localStorage.setItem("ollama_thinking", isThinking() ? "1" : "0");
  });

  function saveSettings(){
    localStorage.setItem("ollama_ngrok_url", normalizeUrl(ngrokUrlEl.value));
    localStorage.setItem("ollama_model", modelEl.value.trim());
    localStorage.setItem("ollama_thinking", isThinking() ? "1" : "0");
    setStatus("✅ Settings saved.", "ok");
  }

  function loadSettings(){
    ngrokUrlEl.value    = localStorage.getItem("ollama_ngrok_url") || "";
    modelEl.value       = localStorage.getItem("ollama_model")     || "gemma4:e4b";
    modeToggle.checked  = localStorage.getItem("ollama_thinking")  === "1";
    updateModeUI();

    const saved = JSON.parse(localStorage.getItem("ollama_messages") || "[]");
    if(saved.length){
      saved.forEach(m => appendMessage(m.role, m.content, m.thinking || "", m.modeStamp || ""));
    } else {
      appendSystemMsg("Ready. Configure settings to start chatting.");
    }
  }

  function getSavedMessages(){ return JSON.parse(localStorage.getItem("ollama_messages")||"[]"); }
  function saveMessages(m){ localStorage.setItem("ollama_messages", JSON.stringify(m)); }

  function parseReply(raw){
    let thinking = "";
    let answer = raw;
    
    const thinkMatch1 = raw.match(/<think>([\s\S]*?)<\/think>/i);
    if(thinkMatch1){
      thinking = thinkMatch1[1].trim();
      answer = raw.replace(/<think>[\s\S]*?<\/think>/i,"").trim();
    } else {
      const thinkMatch2 = raw.match(/<\|channel>thought\n([\s\S]*?)<channel\|>/i);
      if(thinkMatch2){
        thinking = thinkMatch2[1].trim();
        answer = raw.replace(/<\|channel>thought\n[\s\S]*?<channel\|>/i,"").trim();
      }
    }
    return { answer, thinking };
  }

  function appendMessage(role, content, thinking="", modeStamp=""){
    const wrap = document.createElement("div");
    wrap.className = "msg-wrapper";

    // Add permanent mode badge to bot messages
    if(role === "bot" && modeStamp){
      const badge = document.createElement("div");
      badge.className = "mode-badge " + (modeStamp === "think" ? "badge-think" : "badge-fast");
      badge.textContent = modeStamp === "think" ? "🧠 Thinking Mode" : "⚡ Fast Mode";
      wrap.appendChild(badge);
    }

    if(thinking && thinking.trim().length > 0 && role === "bot"){
      const btn = document.createElement("button");
      btn.className = "think-toggle";
      btn.textContent = "▶ Show reasoning";
      
      const block = document.createElement("div");
      block.className = "think-block";
      block.style.display = "none";
      block.textContent = thinking;
      
      btn.addEventListener("click",()=>{
        const open = block.style.display !== "none";
        block.style.display = open ? "none" : "block";
        btn.textContent = open ? "▶ Show reasoning" : "▼ Hide reasoning";
        chatBox.scrollTop = chatBox.scrollHeight;
      });
      
      const alignWrap = document.createElement("div");
      alignWrap.style.alignSelf = "flex-start";
      alignWrap.appendChild(btn);
      alignWrap.appendChild(block);
      wrap.appendChild(alignWrap);
    }

    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    div.textContent = content;
    wrap.appendChild(div);

    chatBox.appendChild(wrap);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function checkHealth(){
    const base = normalizeUrl(ngrokUrlEl.value);
    if(!base){ setStatus("Please enter ngrok URL.","err"); return; }
    setStatus("Checking connection...");
    try{
      const res  = await fetch(base+"/health",{headers:NGROK_HEADERS});
      const data = await res.json();
      setStatus(
        "Status: "+data.status+
        "\nOllama connected: "+data.ollama_connected,
        data.ollama_connected ? "ok" : "err"
      );
    } catch(err){
      setStatus("Connection failed: "+err.message,"err");
    }
  }

  async function sendMessage(){
    const base      = normalizeUrl(ngrokUrlEl.value);
    const model     = modelEl.value.trim() || "gemma4:e4b";
    const thinking  = isThinking();
    const text      = messageEl.value.trim();
    const modeStamp = thinking ? "think" : "fast";

    if(!base){ drawer.classList.add("active"); overlay.classList.add("active"); setStatus("Enter Ngrok URL first.","err"); return; }
    if(!text) return;

    const messages  = getSavedMessages();
    
    const systemContent = thinking 
      ? "<|think|>\nYou are a thoughtful assistant. Reason through the problem carefully."
      : "You are a helpful, direct assistant. Answer immediately without reasoning or thinking tags.";

    const userMsg   = { role:"user", content:text, thinking:"", modeStamp:"" };
    messages.push(userMsg);
    saveMessages(messages);
    appendMessage("user", text, "", "");
    
    messageEl.value = "";
    messageEl.style.height = "auto";
    
    appendSystemMsg(thinking ? "🧠 Thinking..." : "⚡ Generating...");

    const payload = [
      { role: "system", content: systemContent },
      ...messages.map(m=>({
        role: m.role==="bot" ? "assistant" : m.role,
        content: m.content
      }))
    ];

    try{
      const res  = await fetch(base+"/v1/chat",{
        method:"POST",
        headers: NGROK_HEADERS,
        body: JSON.stringify({
          model,
          stream: false,
          temperature: 0.7,
          messages: payload
        })
      });

      const data = await res.json();
      
      const toasts = document.querySelectorAll(".system-msg");
      if(toasts.length > 0) toasts[toasts.length - 1].remove();

      if(!res.ok) throw new Error(data.error||"Request failed");

      const raw   = (data.message && data.message.content) || data.response || "";
      const { answer, thinking: thinkText } = parseReply(raw);

      const botMsg = { role:"bot", content: answer, thinking: thinkText, modeStamp: modeStamp };
      const updated = getSavedMessages();
      updated.push(botMsg);
      saveMessages(updated);
      appendMessage("bot", answer, thinkText, modeStamp);
      
    } catch(err){
      const toasts = document.querySelectorAll(".system-msg");
      if(toasts.length > 0) toasts[toasts.length - 1].remove();
      appendSystemMsg("❌ Error: " + err.message);
    }
  }

  document.getElementById("saveSettings").addEventListener("click", saveSettings);
  document.getElementById("checkHealth").addEventListener("click", checkHealth);
  document.getElementById("sendBtn").addEventListener("click", sendMessage);
  
  document.getElementById("clearBtn").addEventListener("click", () => {
    localStorage.removeItem("ollama_messages");
    chatBox.innerHTML="";
    appendSystemMsg("Chat history cleared.");
    closeDrawer();
  });

  messageEl.addEventListener("keydown", e => {
    if(e.key==="Enter" && !e.shiftKey){ 
      e.preventDefault(); 
      sendMessage(); 
    }
  });

  loadSettings();
</script>
</body>
</html>
